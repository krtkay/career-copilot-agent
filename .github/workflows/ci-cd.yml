name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install app + dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test-unit

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/arm64 — Oracle Ampere A1 target VM)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose + Caddy config to the VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: /opt/career-copilot
          strip_components: 0

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_IMAGE: ${{ env.IMAGE }}:${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_IMAGE
          script: |
            set -euo pipefail
            cd /opt/career-copilot
            export API_IMAGE="$GHCR_IMAGE"

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Waiting for the API to come up..."
            for i in $(seq 1 10); do
              if curl -fsS http://localhost:8000/api/v1/health >/dev/null; then
                echo "API is healthy."
                break
              fi
              if [ "$i" -eq 10 ]; then
                echo "API did not become healthy in time." >&2
                docker compose -f docker-compose.prod.yml logs --tail=100 api
                exit 1
              fi
              sleep 3
            done

            # Catches a silent LangGraph-checkpointer fallback to in-memory state
            # (AsyncPostgresSaver.setup() failing but swallowing the error).
            if ! docker compose -f docker-compose.prod.yml logs api | grep -q graph_ready; then
              echo "WARNING: 'graph_ready' not found in API logs — checkpointer may" >&2
              echo "have fallen back to a non-persistent MemorySaver. Investigate." >&2
              exit 1
            fi

            docker image prune -f
