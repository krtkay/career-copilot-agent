# Render Blueprint — free, no-credit-card deployment path.
# See docs/deployment.md for the full walkthrough (Neon for the pgvector DB,
# Render for the API, both free with no card).
#
# `sync: false` env vars are prompted for in the Render dashboard, never
# stored in this file / git. `generateValue: true` lets Render mint a strong
# random secret itself.

services:
  - type: web
    name: career-copilot-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    # Migrations run on every boot (idempotent) since Render's free plan has
    # no separate one-off "pre-deploy" step and no SSH access to run one by
    # hand — unlike the Oracle path, where alembic is a deliberate, separate
    # CI step (see docker-compose.prod.yml / docs/deployment.md history).
    startCommand: >-
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"

      # --- Neon Postgres (free, pgvector-capable) — see docs/deployment.md ---
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        sync: false

      - key: JWT_SECRET_KEY
        generateValue: true
      # Set to your actual Render URL once assigned, e.g.
      # https://career-copilot-api.onrender.com — must not be "*" in production.
      - key: CORS_ORIGINS
        sync: false

      # --- LLM providers (at least LLM1 required; LLM2 is the free Groq fallback) ---
      - key: LLM1_NAME
        value: openai
      - key: LLM1_MODEL
        value: gpt-4o-mini
      - key: LLM1_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM1_API_KEY
        sync: false
      - key: LLM2_NAME
        value: groq
      - key: LLM2_MODEL
        value: openai/gpt-oss-120b
      - key: LLM2_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM2_API_KEY
        sync: false

      # --- Job search (optional; job_search route degrades gracefully without it) ---
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
